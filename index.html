<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Interval Timer">
  <title>Interval Timer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      gap: clamp(16px, 3.5vh, 32px);
      overflow-y: auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    .phase-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 1.8rem;
      transition: color 0.3s;
    }

    .phase-label.work  { color: #4ade80; }
    .phase-label.rest  { color: #60a5fa; }
    .phase-label.idle  { color: #555; }

    .timer-ring {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .timer-ring svg { transform: rotate(-90deg); }

    .ring-bg {
      fill: none;
      stroke: #222;
      stroke-width: 12;
    }

    .ring-progress {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s linear, stroke 0.3s;
    }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .time-display {
      font-size: 3.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .round-display {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.06em;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }

    .setting-block {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .setting-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .setting-label.work { color: #4ade80; }
    .setting-label.rest { color: #60a5fa; }

    .setting-value {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: center;
    }

    .setting-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .adj-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .adj-btn:active { background: #3a3a3a; transform: scale(0.92); }

    .start-btn {
      width: 100%;
      max-width: 320px;
      height: 64px;
      border-radius: 20px;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .start-btn.start { background: #4ade80; color: #0f0f0f; }
    .start-btn.stop  { background: #f87171; color: #0f0f0f; }
    .start-btn:active { transform: scale(0.97); }

    .game-launch-btn {
      width: 100%;
      max-width: 320px;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: #a78bfa;
      color: #0f0f0f;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .game-launch-btn:active { transform: scale(0.97); background: #c4b5fd; }

    /* Game Overlay */
    #gameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }

    #gameOverlay.active { display: flex; }

    .game-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a78bfa;
    }

    #gameCanvas {
      border-radius: 14px;
      background: #111;
      touch-action: none;
      width: min(360px, 100%);
      height: auto;
      display: block;
    }

    .game-hint {
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.06em;
      min-height: 1.1rem;
      text-align: center;
    }

    .back-btn {
      height: 48px;
      padding: 0 32px;
      border-radius: 16px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: #2a2a2a;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .back-btn:active { background: #3a3a3a; transform: scale(0.97); }

    .game2-launch-btn {
      width: 100%;
      max-width: 320px;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: #fbbf24;
      color: #0f0f0f;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    .game2-launch-btn:active { transform: scale(0.97); background: #fcd34d; }

    #game2Overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
    }
    #game2Overlay.active { display: flex; }

    .game2-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fbbf24;
    }

    #gameCanvas2 {
      border-radius: 14px;
      background: #111;
      touch-action: none;
      width: min(360px, 100%);
      height: auto;
      display: block;
    }

    .map-launch-btn {
      width: 100%;
      max-width: 320px;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: #38bdf8;
      color: #0f0f0f;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .map-launch-btn:active { transform: scale(0.97); background: #7dd3fc; }

    #mapOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      flex-direction: column;
      background: #0f0f0f;
    }
    #mapOverlay.active { display: flex; }

    .map-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #111;
      z-index: 400;
      flex-shrink: 0;
    }

    .map-back-btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .map-search-wrap {
      flex: 1;
      display: flex;
      gap: 6px;
    }

    #mapSearchInput {
      flex: 1;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: #222;
      color: #fff;
      padding: 0 14px;
      font-size: 0.95rem;
      outline: none;
    }
    #mapSearchInput::placeholder { color: #555; }

    .map-search-btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      color: #0f0f0f;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .map-locate-btn {
      height: 40px;
      width: 40px;
      border-radius: 12px;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #mapContainer {
      flex: 1;
      min-height: 0;
    }

    .map-no-result {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #f87171;
      color: #fff;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .map-no-result.show { opacity: 1; }
  </style>
</head>
<body>

  <h1>Interval Timer</h1>

  <div class="phase-label idle" id="phaseLabel">—</div>

  <div class="timer-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="98"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="98"/>
    </svg>
    <div class="timer-center">
      <div class="time-display" id="timeDisplay">—</div>
      <div class="round-display" id="roundDisplay"></div>
    </div>
  </div>

  <div class="settings">
    <div class="setting-block">
      <div class="setting-label work">Arbeit</div>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjust('work', -5)">−</button>
        <div class="setting-value" id="workVal">60</div>
        <button class="adj-btn" onclick="adjust('work', +5)">+</button>
      </div>
      <div style="font-size:0.7rem;color:#555;">Sekunden</div>
    </div>
    <div class="setting-block">
      <div class="setting-label rest">Pause</div>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjust('rest', -5)">−</button>
        <div class="setting-value" id="restVal">25</div>
        <button class="adj-btn" onclick="adjust('rest', +5)">+</button>
      </div>
      <div style="font-size:0.7rem;color:#555;">Sekunden</div>
    </div>
  </div>

  <button class="start-btn start" id="startBtn" onclick="toggle()">START</button>

  <button class="game-launch-btn" onclick="openGame()">HAUKE RUNNER</button>
  <button class="game2-launch-btn" onclick="openGame2()">GT HAUKE 6</button>
  <button class="map-launch-btn" onclick="openMap()">KARTE</button>

  <!-- Map Overlay -->
  <div id="mapOverlay">
    <div class="map-header">
      <button class="map-back-btn" onclick="closeMap()">← Zurück</button>
      <div class="map-search-wrap">
        <input type="text" id="mapSearchInput" placeholder="Ort suchen…"
               onkeydown="if(event.key==='Enter')searchPlace()">
        <button class="map-search-btn" onclick="searchPlace()">OK</button>
      </div>
      <button class="map-locate-btn" onclick="locateMe()" title="Mein Standort">📍</button>
    </div>
    <div id="mapContainer"></div>
    <div class="map-no-result" id="mapNoResult">Kein Ergebnis gefunden</div>
  </div>

  <!-- GT Hauke 6 Overlay -->
  <div id="game2Overlay">
    <div class="game2-title">GT Hauke 6</div>
    <canvas id="gameCanvas2" width="360" height="240"></canvas>
    <div class="game-hint" id="game2Hint">Links: Bewegen &nbsp;|&nbsp; Rechts: Schießen</div>
    <button class="back-btn" onclick="closeGame2()">← ZURÜCK</button>
  </div>

  <!-- Game Overlay -->
  <div id="gameOverlay">
    <div class="game-title">Hauke Runner</div>
    <canvas id="gameCanvas" width="360" height="180"></canvas>
    <div class="game-hint" id="gameHint">Tippen zum Springen!</div>
    <button class="back-btn" onclick="closeGame()">← ZURÜCK</button>
  </div>

  <script>
    /* INTERVAL TIMER */
    const CIRCUMFERENCE = 2 * Math.PI * 98;
    let workSec = 60, restSec = 25;
    let running = false, tickId = null, keepAliveId = null;
    let phase = 'work', remaining = 0, phaseDuration = 0, round = 0;
    let audioCtx = null;

    const ringProgress = document.getElementById('ringProgress');
    const timeDisplay  = document.getElementById('timeDisplay');
    const phaseLabel   = document.getElementById('phaseLabel');
    const roundDisplay = document.getElementById('roundDisplay');
    const startBtn     = document.getElementById('startBtn');

    ringProgress.style.strokeDasharray = CIRCUMFERENCE;

    function setRing(ratio, color) {
      ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
      ringProgress.style.stroke = color;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : String(sec);
    }

    function adjust(type, delta) {
      if (running) return;
      if (type === 'work') { workSec = Math.max(5, workSec + delta); document.getElementById('workVal').textContent = workSec; }
      else { restSec = Math.max(5, restSec + delta); document.getElementById('restVal').textContent = restSec; }
    }

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(ctx, freq, startTime, duration, ramp) {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.4, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration + ramp);
      osc.start(startTime); osc.stop(startTime + duration + ramp + 0.05);
    }

    function beep(type) {
      const ctx = getAudioCtx(), now = ctx.currentTime;
      if (type === 'work')           { playTone(ctx,880,now,0.12,0.08); playTone(ctx,880,now+0.18,0.12,0.08); }
      else if (type === 'rest')      { playTone(ctx,440,now,0.25,0.12); }
      else if (type === 'countdown') { playTone(ctx,660,now,0.06,0.04); }
    }

    function keepAudioAlive() {
      const ctx = getAudioCtx(), buf = ctx.createBuffer(1,1,22050), src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
    }

    function startPhase(p) {
      phase = p; phaseDuration = p==='work'?workSec:restSec; remaining = phaseDuration;
      if (p==='work') { round++; phaseLabel.textContent='ARBEIT'; phaseLabel.className='phase-label work'; beep('work'); }
      else            { phaseLabel.textContent='PAUSE'; phaseLabel.className='phase-label rest'; beep('rest'); }
      roundDisplay.textContent = `Runde ${round}`; updateDisplay();
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remaining);
      setRing(remaining/phaseDuration, phase==='work'?'#4ade80':'#60a5fa');
      if (remaining<=3 && remaining>0) beep('countdown');
    }

    function tick() {
      if (remaining<=1) startPhase(phase==='work'?'rest':'work');
      else { remaining--; updateDisplay(); }
    }

    function toggle() { running ? stopTimer() : startTimer(); }

    function startTimer() {
      getAudioCtx(); running=true; round=0;
      startBtn.textContent='STOP'; startBtn.className='start-btn stop';
      startPhase('work');
      tickId=setInterval(tick,1000); keepAliveId=setInterval(keepAudioAlive,20000);
    }

    function stopTimer() {
      running=false; clearInterval(tickId); clearInterval(keepAliveId); tickId=keepAliveId=null;
      startBtn.textContent='START'; startBtn.className='start-btn start';
      phaseLabel.textContent='—'; phaseLabel.className='phase-label idle';
      timeDisplay.textContent='—'; roundDisplay.textContent='';
      setRing(1,'#333');
    }

    setRing(1,'#333');

    /* HAUKE RUNNER */
    const GW=360,GH=180,GND=148,GRAV=0.55,JUMP_V=-11.5;
    let gRunning=false,gOver=false,gScore=0,gHi=0,gSpeed=4,gFrame=0,gAnimId=null;
    let px=55,py=GND,pvy=0,pOnGround=true,pLeg=0,pLegT=0;
    let obs=[],obsT=0,obsInt=90;
    let bikes=[],bikeT=0,bikeInt=180;
    let birds=[],birdT=0,birdInt=150;
    let clouds=[{x:80,y:28,w:50},{x:220,y:18,w:38},{x:310,y:34,w:44}];
    let jumpCount=0, winkler=null, winklerPending=false;
    let lastSpawnFrame=0;
    const VERSION='v4';

    function openGame() {
      document.getElementById('gameOverlay').classList.add('active');
      startGame();
    }

    function closeGame() {
      document.getElementById('gameOverlay').classList.remove('active');
      gRunning=false;
      if (gAnimId) { cancelAnimationFrame(gAnimId); gAnimId=null; }
    }

    function startGame() {
      gRunning=true; gOver=false; gScore=0; gSpeed=4; gFrame=0;
      py=GND; pvy=0; pOnGround=true; pLeg=0; pLegT=0;
      bikes=[]; bikeT=0; bikeInt=240;
      birds=[]; birdT=0; birdInt=280;
      obs=[]; obsT=0; obsInt=100;
      jumpCount=0; winkler=null; winklerPending=false;
      lastSpawnFrame=0;
      document.getElementById('gameHint').textContent='Tippen zum Springen!';
      if (gAnimId) cancelAnimationFrame(gAnimId);
      gAnimId=requestAnimationFrame(gameLoop);
    }

    function doJump() {
      if (gOver) { startGame(); return; }
      if (pOnGround) {
        pvy=JUMP_V; pOnGround=false;
        jumpCount++;
        if (jumpCount % 5 === 0) winklerPending=true;
      }
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('gameOverlay').classList.contains('active')) return;
      if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
    });

    document.getElementById('gameCanvas').addEventListener('pointerdown', e => {
      e.preventDefault(); doJump();
    });

    function drawStickman(ctx,x,y,leg,inAir) {
      ctx.save();
      ctx.strokeStyle='#a78bfa'; ctx.lineWidth=2.5;
      ctx.lineCap='round'; ctx.lineJoin='round';
      const headR=7,headY=y-36,neckY=y-28,hipY=y-12,armY=neckY+5;
      ctx.beginPath(); ctx.arc(x,headY,headR,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,neckY); ctx.lineTo(x,hipY); ctx.stroke();
      if (inAir) {
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x-12,armY-9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x+12,armY-9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x-10,y-4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x+10,y-4); ctx.stroke();
      } else {
        const s=leg===0?1:-1;
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x-11,armY+9*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x+11,armY-9*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x-10*s,y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x+10*s,y); ctx.stroke();
      }
      ctx.fillStyle='#6d4fc2'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Hauke',x,headY-headR-3);
      ctx.restore();
    }

    function drawObstacle(ctx,o) {
      const oy=GND-o.h;
      ctx.fillStyle='#f87171'; ctx.fillRect(o.x,oy,o.w,o.h);
      ctx.fillStyle='#fca5a5'; ctx.fillRect(o.x,oy,o.w,3);
    }

    function drawCloud(ctx,c) {
      ctx.fillStyle='#1e1e1e';
      ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,9,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(c.x-c.w*.22,c.y+3,c.w*.3,7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(c.x+c.w*.22,c.y+4,c.w*.28,6,0,0,Math.PI*2); ctx.fill();
    }

    function drawBike(ctx, x) {
      const r=11, wy=GND-r;
      ctx.save(); ctx.strokeStyle='#fb923c'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(x-13,wy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+13,wy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-13,wy); ctx.lineTo(x,wy-13); ctx.lineTo(x+13,wy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,wy-13); ctx.lineTo(x-9,wy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+13,wy); ctx.lineTo(x+9,wy-15); ctx.lineTo(x+15,wy-15); ctx.stroke();
      // Rider
      ctx.beginPath(); ctx.arc(x+5,wy-28,5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,wy-13); ctx.lineTo(x+5,wy-23); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+5,wy-23); ctx.lineTo(x+12,wy-15); ctx.stroke();
      ctx.fillStyle='#fb923c'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Chris', x, GND-r*2-22);
      ctx.restore();
    }

    function drawBird(ctx, x, y) {
      ctx.save(); ctx.strokeStyle='#f472b6'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x-14,y); ctx.quadraticCurveTo(x-7,y-9,x,y);
      ctx.quadraticCurveTo(x+7,y-9,x+14,y); ctx.stroke();
      ctx.fillStyle='#f472b6'; ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill();
      ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Anika', x, y-13);
      ctx.restore();
    }

    function hitTest(o) {
      const pl=px-10,pr=px+10,pt=py-32,pb=py;
      const ol=o.x+2,or2=o.x+o.w-2,ot=GND-o.h;
      return pl<or2&&pr>ol&&pt<GND&&pb>ot;
    }

    function hitTestBike(bx) {
      return px+10>bx-11 && px-10<bx+11 && py>GND-24 && py-32<GND;
    }

    function hitTestBird(bx, by) {
      return px+8>bx-12 && px-8<bx+12 && py-32<by+5 && py>by-9;
    }

    function drawTuba(ctx, x) {
      ctx.save();
      const by=GND;
      ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
      // Main body oval
      ctx.beginPath(); ctx.ellipse(x, by-28, 15, 20, 0, 0, Math.PI*2); ctx.stroke();
      // Bell circle on top
      ctx.beginPath(); ctx.arc(x, by-53, 12, 0, Math.PI*2); ctx.stroke();
      // Bell inside dark
      ctx.fillStyle='#1a0d00'; ctx.beginPath(); ctx.arc(x, by-53, 8, 0, Math.PI*2); ctx.fill();
      // Tubes connecting bell to body
      ctx.strokeStyle='#fbbf24';
      ctx.beginPath(); ctx.moveTo(x-9,by-46); ctx.lineTo(x-15,by-34); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+9,by-46); ctx.lineTo(x+15,by-34); ctx.stroke();
      // Valves
      ctx.fillStyle='#fbbf24';
      for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(x,by-15-i*9,3.5,0,Math.PI*2); ctx.fill(); }
      // Mouthpiece
      ctx.beginPath(); ctx.moveTo(x+15,by-24); ctx.lineTo(x+27,by-20); ctx.stroke();
      // Boss label
      ctx.fillStyle='#fbbf24'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('DerWinkler', x, by-70);
      ctx.restore();
    }

    function hitTestWinkler(wx) {
      return px+10>wx-16 && px-10<wx+16 && py>GND-58 && py-32<GND;
    }

    function gameLoop() {
      if (!gRunning) return;
      const canvas=document.getElementById('gameCanvas');
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,GW,GH);

      const grad=ctx.createLinearGradient(0,0,0,GND);
      grad.addColorStop(0,'#0a0a0a'); grad.addColorStop(1,'#141414');
      ctx.fillStyle=grad; ctx.fillRect(0,0,GW,GND);

      for (const c of clouds) {
        c.x-=gSpeed*0.2;
        if (c.x+c.w<0) c.x=GW+c.w;
        drawCloud(ctx,c);
      }

      ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,GND,GW,GH-GND);
      ctx.strokeStyle='#333'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,GND); ctx.lineTo(GW,GND); ctx.stroke();

      ctx.strokeStyle='#252525'; ctx.lineWidth=1;
      const dashOff=-((gFrame*gSpeed)%40);
      for (let dx=dashOff;dx<GW;dx+=40) {
        ctx.beginPath(); ctx.moveTo(dx,GND+7); ctx.lineTo(dx+20,GND+7); ctx.stroke();
      }

      pvy+=GRAV; py+=pvy;
      if (py>=GND) { py=GND; pvy=0; pOnGround=true; }

      if (pOnGround) { pLegT++; if (pLegT>=7) { pLeg=(pLeg+1)%2; pLegT=0; } }

      drawStickman(ctx,px,py,pLeg,!pOnGround);

      obsT++;
      if (obsT>=obsInt) {
        if (gFrame-lastSpawnFrame >= 70) {
          obs.push({x:GW+10,w:14+Math.random()*10,h:24+Math.random()*20});
          lastSpawnFrame=gFrame;
        }
        obsT=0;
        const base=Math.max(46, 100-Math.floor(gScore/500)*8);
        obsInt=base+Math.floor(Math.random()*50);
      }

      for (let i=obs.length-1;i>=0;i--) {
        obs[i].x-=gSpeed;
        drawObstacle(ctx,obs[i]);
        if (hitTest(obs[i])) { endGame(ctx); return; }
        if (obs[i].x+obs[i].w<0) obs.splice(i,1);
      }

      bikeT++;
      if (bikeT >= bikeInt) {
        if (gScore > 300 && gFrame-lastSpawnFrame >= 70) {
          bikes.push({ x: GW+30 });
          lastSpawnFrame=gFrame;
        }
        bikeT=0;
        const bikeBase=Math.max(100, 240-Math.floor(gScore/600)*15);
        bikeInt=bikeBase+Math.floor(Math.random()*100);
      }
      for (let i=bikes.length-1;i>=0;i--) {
        bikes[i].x -= gSpeed + 1.5;
        drawBike(ctx, bikes[i].x);
        if (hitTestBike(bikes[i].x)) { endGame(ctx); return; }
        if (bikes[i].x < -40) bikes.splice(i,1);
      }

      birdT++;
      if (birdT >= birdInt) {
        if (gScore > 600 && gFrame-lastSpawnFrame >= 70) {
          const birdY = GND - 48 - Math.random()*18;
          birds.push({ x: GW+20, y: birdY });
          lastSpawnFrame=gFrame;
        }
        birdT=0;
        const birdBase=Math.max(90, 280-Math.floor(gScore/600)*20);
        birdInt=birdBase+Math.floor(Math.random()*100);
      }
      for (let i=birds.length-1;i>=0;i--) {
        birds[i].x -= gSpeed;
        drawBird(ctx, birds[i].x, birds[i].y);
        if (hitTestBird(birds[i].x, birds[i].y)) { endGame(ctx); return; }
        if (birds[i].x < -40) birds.splice(i,1);
      }

      // DerWinkler boss
      if (winklerPending && !winkler) {
        winkler={ x: GW+40 };
        winklerPending=false;
      }
      if (winkler) {
        winkler.x -= gSpeed + 0.5;
        drawTuba(ctx, winkler.x);
        if (hitTestWinkler(winkler.x)) { endGame(ctx); return; }
        if (winkler.x < -60) winkler=null;
      }

      gScore++; gSpeed=4+Math.floor(gScore/200)*0.4;

      ctx.fillStyle='#333'; ctx.font='600 12px monospace'; ctx.textAlign='right';
      ctx.fillText(`HI  ${gHi}`,GW-10,18);
      ctx.fillStyle='#666'; ctx.fillText(`${gScore}`,GW-10,34);
      ctx.fillStyle='#ffffff'; ctx.font='10px monospace'; ctx.textAlign='left';
      ctx.fillText(VERSION,6,12);
      ctx.textAlign='left';

      gFrame++; gAnimId=requestAnimationFrame(gameLoop);
    }

    function endGame(ctx) {
      gRunning=false; gOver=true;
      if (gScore>gHi) gHi=gScore;
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,GW,GH);
      ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
      ctx.fillText('GAME OVER',GW/2,GH/2-12);
      ctx.fillStyle='#555'; ctx.font='13px sans-serif';
      ctx.fillText('Tippen zum Neustart',GW/2,GH/2+12);
      ctx.textAlign='left';
      document.getElementById('gameHint').textContent=
        `Score: ${gScore}`+(gScore>=gHi?' — Neuer Rekord!':`  |  Rekord: ${gHi}`);
    }
    // ── MAP ──
    let leafletMap = null;
    let searchMarker = null;

    function openMap() {
      document.getElementById('mapOverlay').classList.add('active');
      if (!leafletMap) {
        leafletMap = L.map('mapContainer', { zoomControl: true }).setView([51.1657, 10.4515], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 19
        }).addTo(leafletMap);
      }
      setTimeout(() => leafletMap.invalidateSize(), 100);
    }

    function closeMap() {
      document.getElementById('mapOverlay').classList.remove('active');
    }

    async function searchPlace() {
      const q = document.getElementById('mapSearchInput').value.trim();
      if (!q) return;
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,
          { headers: { 'Accept-Language': 'de' } }
        );
        const data = await res.json();
        if (data.length === 0) { showNoResult(); return; }
        const { lat, lon, display_name } = data[0];
        leafletMap.setView([+lat, +lon], 15);
        if (searchMarker) searchMarker.remove();
        searchMarker = L.marker([+lat, +lon]).addTo(leafletMap)
          .bindPopup(display_name).openPopup();
      } catch { showNoResult(); }
    }

    function locateMe() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        leafletMap.setView([lat, lon], 15);
        if (searchMarker) searchMarker.remove();
        searchMarker = L.marker([lat, lon]).addTo(leafletMap)
          .bindPopup('Mein Standort').openPopup();
      }, () => showNoResult());
    }

    function showNoResult() {
      const el = document.getElementById('mapNoResult');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    /* ── GT HAUKE 6 ── */
    const G2W=360, G2H=240, P2R=10, P2SPD=3, B2SPD=7;
    let g2Running=false, g2Over=false;
    let g2Score=0, g2Hi=0, g2Lives=3, g2Wave=0, g2AnimId2=null, g2Frame2=0;
    let p2x=G2W/2, p2y=G2H/2, p2angle=0, p2inv=0;
    let g2Bullets=[], g2ShootCD=0;
    let g2Enemies=[], g2Pylons=[], g2EProj=[], g2Pickups=[];
    let g2Chris2=null, g2Anika2=null, g2Winkler2=null;
    let g2ChrisT=0, g2AnikaT=0;
    let g2WaveActive=false, g2WaveDelay=0;
    let joy2={active:false,cx:0,cy:0,dx:0,dy:0,id:-1};
    let shoot2={active:false,id:-1};
    const G2KEYS={};
    let g2TouchSetup=false;

    const G2DESKS=[
      {x:60,y:50,w:44,h:26},{x:256,y:50,w:44,h:26},
      {x:60,y:164,w:44,h:26},{x:256,y:164,w:44,h:26},
      {x:148,y:107,w:64,h:26}
    ];

    function openGame2() {
      document.getElementById('game2Overlay').classList.add('active');
      if (!g2TouchSetup) { setupGame2Touch(); g2TouchSetup=true; }
      startGame2();
    }

    function closeGame2() {
      document.getElementById('game2Overlay').classList.remove('active');
      g2Running=false;
      if (g2AnimId2) { cancelAnimationFrame(g2AnimId2); g2AnimId2=null; }
    }

    function startGame2() {
      g2Running=true; g2Over=false;
      g2Score=0; g2Lives=3; g2Wave=0; g2Frame2=0;
      p2x=G2W/2; p2y=G2H/2; p2angle=0; p2inv=0;
      g2Bullets=[]; g2Enemies=[]; g2Pylons=[]; g2EProj=[]; g2Pickups=[];
      g2Chris2=null; g2Anika2=null; g2Winkler2=null;
      g2ChrisT=0; g2AnikaT=0; g2ShootCD=0;
      joy2={active:false,cx:0,cy:0,dx:0,dy:0,id:-1};
      shoot2={active:false,id:-1};
      g2WaveActive=false; g2WaveDelay=60;
      document.getElementById('game2Hint').textContent='Links: Bewegen  |  Rechts: Schießen';
      if (g2AnimId2) cancelAnimationFrame(g2AnimId2);
      g2AnimId2=requestAnimationFrame(gameLoop2);
    }

    function setupGame2Touch() {
      const cv=document.getElementById('gameCanvas2');
      cv.addEventListener('pointerdown', e=>{
        if (g2Over) { startGame2(); return; }
        if (!g2Running) return;
        e.preventDefault();
        const r=cv.getBoundingClientRect();
        const cx=(e.clientX-r.left)*(G2W/r.width);
        const cy=(e.clientY-r.top)*(G2H/r.height);
        if (cx<G2W/2) { if(!joy2.active) joy2={active:true,cx,cy,dx:0,dy:0,id:e.pointerId}; }
        else { shoot2={active:true,id:e.pointerId}; }
      },{passive:false});
      cv.addEventListener('pointermove', e=>{
        if (e.pointerId!==joy2.id) return;
        e.preventDefault();
        const r=cv.getBoundingClientRect();
        joy2.dx=(e.clientX-r.left)*(G2W/r.width)-joy2.cx;
        joy2.dy=(e.clientY-r.top)*(G2H/r.height)-joy2.cy;
      },{passive:false});
      cv.addEventListener('pointerup', e=>{
        if (e.pointerId===joy2.id){joy2.active=false;joy2.dx=0;joy2.dy=0;}
        if (e.pointerId===shoot2.id) shoot2.active=false;
      });
      cv.addEventListener('pointercancel', e=>{
        if (e.pointerId===joy2.id){joy2.active=false;joy2.dx=0;joy2.dy=0;}
        if (e.pointerId===shoot2.id) shoot2.active=false;
      });
    }

    document.addEventListener('keydown', e=>{
      if (!document.getElementById('game2Overlay').classList.contains('active')) return;
      G2KEYS[e.code]=true;
    });
    document.addEventListener('keyup', e=>{ G2KEYS[e.code]=false; });

    function g2dist(ax,ay,bx,by){ return Math.sqrt((ax-bx)**2+(ay-by)**2); }

    function circleRect2(cx,cy,cr,rx,ry,rw,rh){
      return g2dist(cx,cy,Math.max(rx,Math.min(cx,rx+rw)),Math.max(ry,Math.min(cy,ry+rh)))<cr;
    }

    function startWave2() {
      g2Wave++;
      const isBoss=(g2Wave%3===0);
      if (isBoss) {
        g2Winkler2={x:G2W-50,y:G2H/2,hp:5,angle:Math.PI,shootT:0};
        spawnPylons2(Math.min(Math.floor(g2Wave/3),3));
        document.getElementById('game2Hint').textContent=`BOSS WELLE ${g2Wave} — DerWinkler!`;
      } else {
        const n=2+g2Wave*2;
        for(let i=0;i<n;i++) spawnEnemy2();
        spawnPylons2(Math.min(g2Wave-1,4));
        document.getElementById('game2Hint').textContent=`Welle ${g2Wave}`;
      }
    }

    function spawnEnemy2() {
      const side=Math.floor(Math.random()*4);
      let ex,ey;
      if(side===0){ex=Math.random()*G2W;ey=-20;}
      else if(side===1){ex=G2W+20;ey=Math.random()*G2H;}
      else if(side===2){ex=Math.random()*G2W;ey=G2H+20;}
      else{ex=-20;ey=Math.random()*G2H;}
      g2Enemies.push({x:ex,y:ey,spd:0.9+Math.random()*0.6+g2Wave*0.08,hp:1});
    }

    const PYLON_POS=[{x:100,y:80},{x:260,y:80},{x:100,y:160},{x:260,y:160},{x:180,y:40}];
    function spawnPylons2(n) {
      g2Pylons=[];
      for(let i=0;i<Math.min(n,PYLON_POS.length);i++)
        g2Pylons.push({...PYLON_POS[i],pulseT:Math.floor(Math.random()*120),waves:[]});
    }

    function takeDamage2() {
      if(p2inv>0) return;
      g2Lives--;
      p2inv=90;
      if(g2Lives<=0) endGame2();
    }

    function endGame2() {
      g2Over=true; g2Running=false;
      if(g2Score>g2Hi) g2Hi=g2Score;
      const ctx=document.getElementById('gameCanvas2').getContext('2d');
      ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,G2W,G2H);
      ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
      ctx.fillText('GAME OVER',G2W/2,G2H/2-12);
      ctx.fillStyle='#555'; ctx.font='13px sans-serif';
      ctx.fillText('Tippen zum Neustart',G2W/2,G2H/2+12);
      document.getElementById('game2Hint').textContent=
        `Score: ${g2Score}`+(g2Score>=g2Hi?' — Neuer Rekord!':`  |  Rekord: ${g2Hi}`);
    }

    function gameLoop2() {
      if (!g2Running) return;
      const ctx=document.getElementById('gameCanvas2').getContext('2d');
      ctx.clearRect(0,0,G2W,G2H);

      // Background grid
      ctx.fillStyle='#121218'; ctx.fillRect(0,0,G2W,G2H);
      ctx.strokeStyle='#1c1c26'; ctx.lineWidth=1;
      for(let x=0;x<G2W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,G2H);ctx.stroke();}
      for(let y=0;y<G2H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(G2W,y);ctx.stroke();}

      // Desks
      for(const d of G2DESKS){
        ctx.fillStyle='#231c1c'; ctx.fillRect(d.x,d.y,d.w,d.h);
        ctx.strokeStyle='#332828'; ctx.lineWidth=1; ctx.strokeRect(d.x,d.y,d.w,d.h);
        ctx.fillStyle='#443030'; ctx.fillRect(d.x+4,d.y+4,d.w-8,8);
      }

      // Wave management
      if (!g2WaveActive && g2WaveDelay>0) {
        g2WaveDelay--;
        if (g2WaveDelay===0) { startWave2(); g2WaveActive=true; }
      }
      if (g2WaveActive && g2Enemies.length===0 && !g2Winkler2) {
        g2WaveActive=false; g2WaveDelay=150;
        g2Pickups.push({x:G2W/2+(Math.random()-.5)*100,y:G2H/2+(Math.random()-.5)*80,t:0});
      }

      // Player input
      let mx=0,my=0;
      if(G2KEYS['ArrowLeft']||G2KEYS['KeyA']) mx-=1;
      if(G2KEYS['ArrowRight']||G2KEYS['KeyD']) mx+=1;
      if(G2KEYS['ArrowUp']||G2KEYS['KeyW']) my-=1;
      if(G2KEYS['ArrowDown']||G2KEYS['KeyS']) my+=1;
      if(joy2.active){
        const jl=Math.sqrt(joy2.dx**2+joy2.dy**2);
        if(jl>8){mx=joy2.dx/jl;my=joy2.dy/jl;}
      }
      const ml=Math.sqrt(mx**2+my**2);
      if(ml>0){mx/=ml;my/=ml;p2angle=Math.atan2(my,mx);}

      let np2x=p2x+mx*P2SPD, np2y=p2y+my*P2SPD;
      np2x=Math.max(P2R,Math.min(G2W-P2R,np2x));
      np2y=Math.max(P2R,Math.min(G2H-P2R,np2y));
      let blocked=false;
      for(const d of G2DESKS) if(circleRect2(np2x,np2y,P2R,d.x,d.y,d.w,d.h)){blocked=true;break;}
      if(!blocked){p2x=np2x;p2y=np2y;}
      if(p2inv>0) p2inv--;

      // Shoot
      if(g2ShootCD>0) g2ShootCD--;
      if((shoot2.active||G2KEYS['Space']||G2KEYS['KeyZ'])&&g2ShootCD===0){
        g2Bullets.push({x:p2x+Math.cos(p2angle)*13,y:p2y+Math.sin(p2angle)*13,
          dx:Math.cos(p2angle)*B2SPD,dy:Math.sin(p2angle)*B2SPD});
        g2ShootCD=11;
      }

      // Bullets
      for(let i=g2Bullets.length-1;i>=0;i--){
        const b=g2Bullets[i];
        b.x+=b.dx; b.y+=b.dy;
        if(b.x<0||b.x>G2W||b.y<0||b.y>G2H){g2Bullets.splice(i,1);continue;}
        let hit=false;
        for(const d of G2DESKS) if(circleRect2(b.x,b.y,3,d.x,d.y,d.w,d.h)){hit=true;break;}
        if(hit){g2Bullets.splice(i,1);continue;}
        for(let j=g2Enemies.length-1;j>=0;j--){
          if(g2dist(b.x,b.y,g2Enemies[j].x,g2Enemies[j].y)<13){
            g2Enemies.splice(j,1); g2Score+=10; hit=true;
            if(Math.random()<0.12) g2Pickups.push({x:b.x,y:b.y,t:0});
            break;
          }
        }
        if(hit){g2Bullets.splice(i,1);continue;}
        if(g2Winkler2&&g2dist(b.x,b.y,g2Winkler2.x,g2Winkler2.y)<22){
          g2Winkler2.hp--; g2Score+=25; g2Bullets.splice(i,1);
          if(g2Winkler2.hp<=0){
            g2Score+=150; g2Winkler2=null;
            g2Pickups.push({x:G2W/2,y:G2H/2,t:0});
          }
          continue;
        }
        // Draw bullet (Formular-Stack)
        ctx.fillStyle='#e2e8f0'; ctx.fillRect(b.x-4,b.y-2,8,4);
        ctx.fillStyle='#94a3b8'; ctx.fillRect(b.x-4,b.y-2,8,1);
      }

      // Papiertiger enemies
      for(let i=g2Enemies.length-1;i>=0;i--){
        const e=g2Enemies[i];
        const dx=p2x-e.x,dy=p2y-e.y,dl=Math.sqrt(dx*dx+dy*dy);
        const ex2=e.x+dx/dl*e.spd, ey2=e.y+dy/dl*e.spd;
        let eb=false;
        for(const d of G2DESKS) if(circleRect2(ex2,ey2,10,d.x,d.y,d.w,d.h)){eb=true;break;}
        if(!eb){e.x=ex2;e.y=ey2;}
        ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(Math.atan2(dy,dx));
        ctx.fillStyle='#fb923c'; ctx.fillRect(-9,-9,18,18);
        ctx.fillStyle='#fdba74'; ctx.fillRect(-8,-14,5,7); ctx.fillRect(3,-14,5,7);
        ctx.fillStyle='#7c2d12'; ctx.fillRect(-5,-4,3,3); ctx.fillRect(2,-4,3,3);
        ctx.fillStyle='#fb923c'; ctx.font='bold 6px sans-serif'; ctx.textAlign='center';
        ctx.fillText('PT',0,4); ctx.restore();
        ctx.fillStyle='#fb923c'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
        ctx.fillText('Papiertiger',e.x,e.y+20);
        if(p2inv===0&&g2dist(p2x,p2y,e.x,e.y)<P2R+9) takeDamage2();
      }

      // Pylons (Strompylone)
      for(const pl of g2Pylons){
        pl.pulseT++;
        if(pl.pulseT%110===0) pl.waves.push({r:0});
        for(let i=pl.waves.length-1;i>=0;i--){
          const sw=pl.waves[i]; sw.r+=2.2;
          const al=Math.max(0,1-sw.r/65);
          ctx.strokeStyle=`rgba(251,191,36,${al})`; ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(pl.x,pl.y,sw.r,0,Math.PI*2); ctx.stroke();
          if(p2inv===0&&Math.abs(g2dist(p2x,p2y,pl.x,pl.y)-sw.r)<P2R+3) takeDamage2();
          if(sw.r>65) pl.waves.splice(i,1);
        }
        ctx.save(); ctx.translate(pl.x,pl.y);
        ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(0,-14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-12,-6); ctx.lineTo(12,-6); ctx.stroke();
        ctx.fillStyle='#fbbf24';
        ctx.beginPath();ctx.arc(-12,-6,3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(12,-6,3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(0,-14,3,0,Math.PI*2);ctx.fill();
        ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText('⚡',0,6);
        ctx.restore();
      }

      // Chris auf dem Fahrrad
      g2ChrisT++;
      if(g2ChrisT>280&&!g2Chris2){
        const d2=Math.random()<0.5?1:-1;
        g2Chris2={x:d2>0?-40:G2W+40,y:20+Math.random()*(G2H-40),dir:d2};
        g2ChrisT=0;
      }
      if(g2Chris2){
        g2Chris2.x+=5*g2Chris2.dir;
        ctx.save(); ctx.translate(g2Chris2.x,g2Chris2.y);
        if(g2Chris2.dir<0) ctx.scale(-1,1);
        ctx.strokeStyle='#fb923c'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath();ctx.arc(-10,0,6,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.arc(10,0,6,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(0,-7);ctx.lineTo(10,0);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(-6,0);ctx.stroke();
        ctx.fillStyle='#fb923c'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
        ctx.fillText('Chris',0,-16); ctx.restore();
        if(p2inv===0&&g2dist(p2x,p2y,g2Chris2.x,g2Chris2.y)<P2R+10) takeDamage2();
        if(g2Chris2.x>G2W+60||g2Chris2.x<-60) g2Chris2=null;
      }

      // Anika Vögel
      g2AnikaT++;
      if(g2AnikaT>220&&!g2Anika2){
        g2Anika2={x:-20,y:30+Math.random()*(G2H-60),t:0};
        g2AnikaT=0;
      }
      if(g2Anika2){
        g2Anika2.x+=3.5; g2Anika2.t++;
        const ay=g2Anika2.y+Math.sin(g2Anika2.t*0.1)*22;
        ctx.save(); ctx.strokeStyle='#f472b6'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(g2Anika2.x-10,ay);ctx.quadraticCurveTo(g2Anika2.x-5,ay-8,g2Anika2.x,ay);
        ctx.quadraticCurveTo(g2Anika2.x+5,ay-8,g2Anika2.x+10,ay);ctx.stroke();
        ctx.fillStyle='#f472b6'; ctx.font='bold 7px sans-serif'; ctx.textAlign='center';
        ctx.fillText('Anika',g2Anika2.x,ay-14); ctx.restore();
        if(p2inv===0&&g2dist(p2x,p2y,g2Anika2.x,ay)<P2R+8) takeDamage2();
        if(g2Anika2.x>G2W+30) g2Anika2=null;
      }

      // DerWinkler Boss
      if(g2Winkler2){
        const w=g2Winkler2;
        const wdx=p2x-w.x,wdy=p2y-w.y,wl=Math.sqrt(wdx**2+wdy**2);
        w.x+=wdx/wl*1.3; w.y+=wdy/wl*1.3;
        w.angle=Math.atan2(wdy,wdx); w.shootT++;
        if(w.shootT%80===0){
          for(let s=-1;s<=1;s++){
            const a=w.angle+s*0.38;
            g2EProj.push({x:w.x,y:w.y,dx:Math.cos(a)*4,dy:Math.sin(a)*4});
          }
        }
        ctx.save(); ctx.translate(w.x,w.y);
        ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath();ctx.ellipse(0,0,18,14,0,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='#1a0d00';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#fbbf24';
        ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(22,4);ctx.stroke();
        for(let i=0;i<3;i++){ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(-2+i*4,8,2.5,0,Math.PI*2);ctx.fill();}
        ctx.fillStyle='#333';ctx.fillRect(-18,20,36,5);
        ctx.fillStyle='#f87171';ctx.fillRect(-18,20,36*(w.hp/5),5);
        ctx.fillStyle='#fbbf24';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
        ctx.fillText('DerWinkler',0,-26); ctx.restore();
        if(p2inv===0&&g2dist(p2x,p2y,w.x,w.y)<P2R+18) takeDamage2();
      }

      // Enemy projectiles (Tuba-Noten)
      for(let i=g2EProj.length-1;i>=0;i--){
        const ep=g2EProj[i];
        ep.x+=ep.dx; ep.y+=ep.dy;
        if(ep.x<0||ep.x>G2W||ep.y<0||ep.y>G2H){g2EProj.splice(i,1);continue;}
        ctx.fillStyle='#fbbf24'; ctx.font='12px sans-serif'; ctx.textAlign='center';
        ctx.fillText('♩',ep.x,ep.y+5);
        if(p2inv===0&&g2dist(p2x,p2y,ep.x,ep.y)<P2R+5){
          g2EProj.splice(i,1); takeDamage2(); continue;
        }
      }

      // Coffee pickups
      for(let i=g2Pickups.length-1;i>=0;i--){
        const pk=g2Pickups[i]; pk.t++;
        if(pk.t>360&&pk.t%8<4){g2Pickups.splice(i,1);continue;}
        ctx.font='16px sans-serif'; ctx.textAlign='center';
        ctx.fillText('☕',pk.x,pk.y+6);
        if(g2dist(p2x,p2y,pk.x,pk.y)<P2R+12){
          g2Lives=Math.min(3,g2Lives+1); g2Pickups.splice(i,1);
        }
      }

      // Draw player (Hauke top-down)
      ctx.save(); ctx.translate(p2x,p2y);
      if(p2inv>0&&p2inv%6<3) ctx.globalAlpha=0.35;
      ctx.strokeStyle='#a78bfa'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0,0,P2R,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(p2angle)*(P2R+6),Math.sin(p2angle)*(P2R+6)); ctx.stroke();
      ctx.fillStyle='#a78bfa';
      ctx.beginPath();ctx.arc(Math.cos(p2angle)*5,Math.sin(p2angle)*5,2.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.fillStyle='#6d4fc2'; ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Hauke',0,-P2R-6); ctx.restore();

      // HUD
      for(let i=0;i<3;i++){
        ctx.fillStyle=i<g2Lives?'#f87171':'#333';
        ctx.font='15px sans-serif'; ctx.textAlign='left';
        ctx.fillText(i<g2Lives?'♥':'♡',10+i*18,17);
      }
      ctx.fillStyle='#444'; ctx.font='600 11px monospace'; ctx.textAlign='right';
      ctx.fillText(`HI ${g2Hi}`,G2W-8,14);
      ctx.fillStyle='#777'; ctx.fillText(`${g2Score}`,G2W-8,28);
      ctx.fillStyle='#333'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText(`Welle ${g2Wave}`,G2W/2,14);
      ctx.fillStyle='#ffffff'; ctx.font='10px monospace'; ctx.textAlign='left';
      ctx.fillText('v4',6,G2H-6);

      // Joystick visual
      if(joy2.active){
        const jl=Math.sqrt(joy2.dx**2+joy2.dy**2),cl=Math.min(jl,30);
        const jnx=jl>0?joy2.dx/jl*cl:0,jny=jl>0?joy2.dy/jl*cl:0;
        ctx.save(); ctx.globalAlpha=0.22;
        ctx.strokeStyle='#fff'; ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(joy2.cx,joy2.cy,30,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(joy2.cx+jnx,joy2.cy+jny,13,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }

      g2Frame2++;
      g2AnimId2=requestAnimationFrame(gameLoop2);
    }
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
