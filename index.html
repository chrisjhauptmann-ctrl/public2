<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Interval Timer">
  <title>Interval Timer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      gap: clamp(16px, 3.5vh, 32px);
      overflow-y: auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    .phase-label {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 1.8rem;
      transition: color 0.3s;
    }

    .phase-label.work  { color: #4ade80; }
    .phase-label.rest  { color: #60a5fa; }
    .phase-label.idle  { color: #555; }

    .timer-ring {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .timer-ring svg { transform: rotate(-90deg); }

    .ring-bg {
      fill: none;
      stroke: #222;
      stroke-width: 12;
    }

    .ring-progress {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s linear, stroke 0.3s;
    }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .time-display {
      font-size: 3.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .round-display {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.06em;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }

    .setting-block {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .setting-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .setting-label.work { color: #4ade80; }
    .setting-label.rest { color: #60a5fa; }

    .setting-value {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: center;
    }

    .setting-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .adj-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .adj-btn:active { background: #3a3a3a; transform: scale(0.92); }

    .start-btn {
      width: 100%;
      max-width: 320px;
      height: 64px;
      border-radius: 20px;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .start-btn.start { background: #4ade80; color: #0f0f0f; }
    .start-btn.stop  { background: #f87171; color: #0f0f0f; }
    .start-btn:active { transform: scale(0.97); }

    .game-launch-btn {
      width: 100%;
      max-width: 320px;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: #a78bfa;
      color: #0f0f0f;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .game-launch-btn:active { transform: scale(0.97); background: #c4b5fd; }

    /* Game Overlay */
    #gameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }

    #gameOverlay.active { display: flex; }

    .game-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a78bfa;
    }

    #gameCanvas {
      border-radius: 14px;
      background: #111;
      touch-action: none;
      width: min(360px, 100%);
      height: auto;
      display: block;
    }

    .game-hint {
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.06em;
      min-height: 1.1rem;
      text-align: center;
    }

    .back-btn {
      height: 48px;
      padding: 0 32px;
      border-radius: 16px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: #2a2a2a;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .back-btn:active { background: #3a3a3a; transform: scale(0.97); }

    .map-launch-btn {
      width: 100%;
      max-width: 320px;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      background: #38bdf8;
      color: #0f0f0f;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .map-launch-btn:active { transform: scale(0.97); background: #7dd3fc; }

    #mapOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      flex-direction: column;
      background: #0f0f0f;
    }
    #mapOverlay.active { display: flex; }

    .map-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #111;
      z-index: 400;
      flex-shrink: 0;
    }

    .map-back-btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .map-search-wrap {
      flex: 1;
      display: flex;
      gap: 6px;
    }

    #mapSearchInput {
      flex: 1;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: #222;
      color: #fff;
      padding: 0 14px;
      font-size: 0.95rem;
      outline: none;
    }
    #mapSearchInput::placeholder { color: #555; }

    .map-search-btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      color: #0f0f0f;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .map-locate-btn {
      height: 40px;
      width: 40px;
      border-radius: 12px;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #mapContainer {
      flex: 1;
      min-height: 0;
    }

    .map-no-result {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #f87171;
      color: #fff;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .map-no-result.show { opacity: 1; }
  </style>
</head>
<body>

  <h1>Interval Timer</h1>

  <div class="phase-label idle" id="phaseLabel">—</div>

  <div class="timer-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="98"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="98"/>
    </svg>
    <div class="timer-center">
      <div class="time-display" id="timeDisplay">—</div>
      <div class="round-display" id="roundDisplay"></div>
    </div>
  </div>

  <div class="settings">
    <div class="setting-block">
      <div class="setting-label work">Arbeit</div>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjust('work', -5)">−</button>
        <div class="setting-value" id="workVal">60</div>
        <button class="adj-btn" onclick="adjust('work', +5)">+</button>
      </div>
      <div style="font-size:0.7rem;color:#555;">Sekunden</div>
    </div>
    <div class="setting-block">
      <div class="setting-label rest">Pause</div>
      <div class="setting-controls">
        <button class="adj-btn" onclick="adjust('rest', -5)">−</button>
        <div class="setting-value" id="restVal">25</div>
        <button class="adj-btn" onclick="adjust('rest', +5)">+</button>
      </div>
      <div style="font-size:0.7rem;color:#555;">Sekunden</div>
    </div>
  </div>

  <button class="start-btn start" id="startBtn" onclick="toggle()">START</button>

  <button class="game-launch-btn" onclick="openGame()">HAUKE RUNNER</button>
  <button class="map-launch-btn" onclick="openMap()">KARTE</button>

  <!-- Map Overlay -->
  <div id="mapOverlay">
    <div class="map-header">
      <button class="map-back-btn" onclick="closeMap()">← Zurück</button>
      <div class="map-search-wrap">
        <input type="text" id="mapSearchInput" placeholder="Ort suchen…"
               onkeydown="if(event.key==='Enter')searchPlace()">
        <button class="map-search-btn" onclick="searchPlace()">OK</button>
      </div>
      <button class="map-locate-btn" onclick="locateMe()" title="Mein Standort">📍</button>
    </div>
    <div id="mapContainer"></div>
    <div class="map-no-result" id="mapNoResult">Kein Ergebnis gefunden</div>
  </div>

  <!-- Game Overlay -->
  <div id="gameOverlay">
    <div class="game-title">Hauke Runner</div>
    <canvas id="gameCanvas" width="360" height="180"></canvas>
    <div class="game-hint" id="gameHint">Tippen zum Springen!</div>
    <button class="back-btn" onclick="closeGame()">← ZURÜCK</button>
  </div>

  <script>
    /* INTERVAL TIMER */
    const CIRCUMFERENCE = 2 * Math.PI * 98;
    let workSec = 60, restSec = 25;
    let running = false, tickId = null, keepAliveId = null;
    let phase = 'work', remaining = 0, phaseDuration = 0, round = 0;
    let audioCtx = null;

    const ringProgress = document.getElementById('ringProgress');
    const timeDisplay  = document.getElementById('timeDisplay');
    const phaseLabel   = document.getElementById('phaseLabel');
    const roundDisplay = document.getElementById('roundDisplay');
    const startBtn     = document.getElementById('startBtn');

    ringProgress.style.strokeDasharray = CIRCUMFERENCE;

    function setRing(ratio, color) {
      ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
      ringProgress.style.stroke = color;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : String(sec);
    }

    function adjust(type, delta) {
      if (running) return;
      if (type === 'work') { workSec = Math.max(5, workSec + delta); document.getElementById('workVal').textContent = workSec; }
      else { restSec = Math.max(5, restSec + delta); document.getElementById('restVal').textContent = restSec; }
    }

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(ctx, freq, startTime, duration, ramp) {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.4, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration + ramp);
      osc.start(startTime); osc.stop(startTime + duration + ramp + 0.05);
    }

    function beep(type) {
      const ctx = getAudioCtx(), now = ctx.currentTime;
      if (type === 'work')           { playTone(ctx,880,now,0.12,0.08); playTone(ctx,880,now+0.18,0.12,0.08); }
      else if (type === 'rest')      { playTone(ctx,440,now,0.25,0.12); }
      else if (type === 'countdown') { playTone(ctx,660,now,0.06,0.04); }
    }

    function keepAudioAlive() {
      const ctx = getAudioCtx(), buf = ctx.createBuffer(1,1,22050), src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
    }

    function startPhase(p) {
      phase = p; phaseDuration = p==='work'?workSec:restSec; remaining = phaseDuration;
      if (p==='work') { round++; phaseLabel.textContent='ARBEIT'; phaseLabel.className='phase-label work'; beep('work'); }
      else            { phaseLabel.textContent='PAUSE'; phaseLabel.className='phase-label rest'; beep('rest'); }
      roundDisplay.textContent = `Runde ${round}`; updateDisplay();
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remaining);
      setRing(remaining/phaseDuration, phase==='work'?'#4ade80':'#60a5fa');
      if (remaining<=3 && remaining>0) beep('countdown');
    }

    function tick() {
      if (remaining<=1) startPhase(phase==='work'?'rest':'work');
      else { remaining--; updateDisplay(); }
    }

    function toggle() { running ? stopTimer() : startTimer(); }

    function startTimer() {
      getAudioCtx(); running=true; round=0;
      startBtn.textContent='STOP'; startBtn.className='start-btn stop';
      startPhase('work');
      tickId=setInterval(tick,1000); keepAliveId=setInterval(keepAudioAlive,20000);
    }

    function stopTimer() {
      running=false; clearInterval(tickId); clearInterval(keepAliveId); tickId=keepAliveId=null;
      startBtn.textContent='START'; startBtn.className='start-btn start';
      phaseLabel.textContent='—'; phaseLabel.className='phase-label idle';
      timeDisplay.textContent='—'; roundDisplay.textContent='';
      setRing(1,'#333');
    }

    setRing(1,'#333');

    /* HAUKE RUNNER */
    const GW=360,GH=180,GND=148,GRAV=0.55,JUMP_V=-11.5;
    let gRunning=false,gOver=false,gScore=0,gHi=0,gSpeed=4,gFrame=0,gAnimId=null;
    let px=55,py=GND,pvy=0,pOnGround=true,pLeg=0,pLegT=0;
    let obs=[],obsT=0,obsInt=90;
    let bikes=[],bikeT=0,bikeInt=180;
    let birds=[],birdT=0,birdInt=150;
    let clouds=[{x:80,y:28,w:50},{x:220,y:18,w:38},{x:310,y:34,w:44}];

    function openGame() {
      document.getElementById('gameOverlay').classList.add('active');
      startGame();
    }

    function closeGame() {
      document.getElementById('gameOverlay').classList.remove('active');
      gRunning=false;
      if (gAnimId) { cancelAnimationFrame(gAnimId); gAnimId=null; }
    }

    function startGame() {
      gRunning=true; gOver=false; gScore=0; gSpeed=4; gFrame=0;
      py=GND; pvy=0; pOnGround=true; pLeg=0; pLegT=0;
      bikes=[]; bikeT=0; bikeInt=180;
      birds=[]; birdT=0; birdInt=150;
      obs=[]; obsT=0; obsInt=90;
      document.getElementById('gameHint').textContent='Tippen zum Springen!';
      if (gAnimId) cancelAnimationFrame(gAnimId);
      gAnimId=requestAnimationFrame(gameLoop);
    }

    function doJump() {
      if (gOver) { startGame(); return; }
      if (pOnGround) { pvy=JUMP_V; pOnGround=false; }
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('gameOverlay').classList.contains('active')) return;
      if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
    });

    document.getElementById('gameCanvas').addEventListener('pointerdown', e => {
      e.preventDefault(); doJump();
    });

    function drawStickman(ctx,x,y,leg,inAir) {
      ctx.save();
      ctx.strokeStyle='#a78bfa'; ctx.lineWidth=2.5;
      ctx.lineCap='round'; ctx.lineJoin='round';
      const headR=7,headY=y-36,neckY=y-28,hipY=y-12,armY=neckY+5;
      ctx.beginPath(); ctx.arc(x,headY,headR,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,neckY); ctx.lineTo(x,hipY); ctx.stroke();
      if (inAir) {
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x-12,armY-9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x+12,armY-9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x-10,y-4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x+10,y-4); ctx.stroke();
      } else {
        const s=leg===0?1:-1;
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x-11,armY+9*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,armY); ctx.lineTo(x+11,armY-9*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x-10*s,y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x,hipY); ctx.lineTo(x+10*s,y); ctx.stroke();
      }
      ctx.fillStyle='#6d4fc2'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Hauke',x,headY-headR-3);
      ctx.restore();
    }

    function drawObstacle(ctx,o) {
      const oy=GND-o.h;
      ctx.fillStyle='#f87171'; ctx.fillRect(o.x,oy,o.w,o.h);
      ctx.fillStyle='#fca5a5'; ctx.fillRect(o.x,oy,o.w,3);
    }

    function drawCloud(ctx,c) {
      ctx.fillStyle='#1e1e1e';
      ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w/2,9,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(c.x-c.w*.22,c.y+3,c.w*.3,7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(c.x+c.w*.22,c.y+4,c.w*.28,6,0,0,Math.PI*2); ctx.fill();
    }

    function drawBike(ctx, x) {
      const r=11, wy=GND-r;
      ctx.save(); ctx.strokeStyle='#fb923c'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(x-13,wy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+13,wy,r,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-13,wy); ctx.lineTo(x,wy-13); ctx.lineTo(x+13,wy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,wy-13); ctx.lineTo(x-9,wy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+13,wy); ctx.lineTo(x+9,wy-15); ctx.lineTo(x+15,wy-15); ctx.stroke();
      // Rider
      ctx.beginPath(); ctx.arc(x+5,wy-28,5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,wy-13); ctx.lineTo(x+5,wy-23); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+5,wy-23); ctx.lineTo(x+12,wy-15); ctx.stroke();
      ctx.fillStyle='#fb923c'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Chris', x, GND-r*2-22);
      ctx.restore();
    }

    function drawBird(ctx, x, y) {
      ctx.save(); ctx.strokeStyle='#f472b6'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x-14,y); ctx.quadraticCurveTo(x-7,y-9,x,y);
      ctx.quadraticCurveTo(x+7,y-9,x+14,y); ctx.stroke();
      ctx.fillStyle='#f472b6'; ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill();
      ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('Anika', x, y-13);
      ctx.restore();
    }

    function hitTest(o) {
      const pl=px-10,pr=px+10,pt=py-32,pb=py;
      const ol=o.x+2,or2=o.x+o.w-2,ot=GND-o.h;
      return pl<or2&&pr>ol&&pt<GND&&pb>ot;
    }

    function hitTestBike(bx) {
      return px+10>bx-11 && px-10<bx+11 && py>GND-24 && py-32<GND;
    }

    function hitTestBird(bx, by) {
      return px+8>bx-12 && px-8<bx+12 && py-32<by+5 && py>by-9;
    }

    function gameLoop() {
      if (!gRunning) return;
      const canvas=document.getElementById('gameCanvas');
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,GW,GH);

      const grad=ctx.createLinearGradient(0,0,0,GND);
      grad.addColorStop(0,'#0a0a0a'); grad.addColorStop(1,'#141414');
      ctx.fillStyle=grad; ctx.fillRect(0,0,GW,GND);

      for (const c of clouds) {
        c.x-=gSpeed*0.2;
        if (c.x+c.w<0) c.x=GW+c.w;
        drawCloud(ctx,c);
      }

      ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,GND,GW,GH-GND);
      ctx.strokeStyle='#333'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,GND); ctx.lineTo(GW,GND); ctx.stroke();

      ctx.strokeStyle='#252525'; ctx.lineWidth=1;
      const dashOff=-((gFrame*gSpeed)%40);
      for (let dx=dashOff;dx<GW;dx+=40) {
        ctx.beginPath(); ctx.moveTo(dx,GND+7); ctx.lineTo(dx+20,GND+7); ctx.stroke();
      }

      pvy+=GRAV; py+=pvy;
      if (py>=GND) { py=GND; pvy=0; pOnGround=true; }

      if (pOnGround) { pLegT++; if (pLegT>=7) { pLeg=(pLeg+1)%2; pLegT=0; } }

      drawStickman(ctx,px,py,pLeg,!pOnGround);

      obsT++;
      if (obsT>=obsInt) {
        obs.push({x:GW+10,w:14+Math.random()*10,h:24+Math.random()*20});
        obsT=0; obsInt=Math.max(46,90-Math.floor(gScore/300)*6);
      }

      for (let i=obs.length-1;i>=0;i--) {
        obs[i].x-=gSpeed;
        drawObstacle(ctx,obs[i]);
        if (hitTest(obs[i])) { endGame(ctx); return; }
        if (obs[i].x+obs[i].w<0) obs.splice(i,1);
      }

      // Chris bikes
      bikeT++;
      if (bikeT >= bikeInt) {
        bikes.push({ x: GW+30 });
        bikeT=0; bikeInt=Math.max(100, 180-Math.floor(gScore/400)*10);
      }
      for (let i=bikes.length-1;i>=0;i--) {
        bikes[i].x -= gSpeed + 1.5;
        drawBike(ctx, bikes[i].x);
        if (hitTestBike(bikes[i].x)) { endGame(ctx); return; }
        if (bikes[i].x < -40) bikes.splice(i,1);
      }

      // Anika birds
      birdT++;
      if (birdT >= birdInt) {
        const birdY = GND - 48 - Math.random()*18;
        birds.push({ x: GW+20, y: birdY });
        birdT=0; birdInt=Math.max(90, 150-Math.floor(gScore/400)*8);
      }
      for (let i=birds.length-1;i>=0;i--) {
        birds[i].x -= gSpeed;
        drawBird(ctx, birds[i].x, birds[i].y);
        if (hitTestBird(birds[i].x, birds[i].y)) { endGame(ctx); return; }
        if (birds[i].x < -40) birds.splice(i,1);
      }

      gScore++; gSpeed=4+Math.floor(gScore/200)*0.4;

      ctx.fillStyle='#333'; ctx.font='600 12px monospace'; ctx.textAlign='right';
      ctx.fillText(`HI  ${gHi}`,GW-10,18);
      ctx.fillStyle='#666'; ctx.fillText(`${gScore}`,GW-10,34);
      ctx.textAlign='left';

      gFrame++; gAnimId=requestAnimationFrame(gameLoop);
    }

    function endGame(ctx) {
      gRunning=false; gOver=true;
      if (gScore>gHi) gHi=gScore;
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,GW,GH);
      ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
      ctx.fillText('GAME OVER',GW/2,GH/2-12);
      ctx.fillStyle='#555'; ctx.font='13px sans-serif';
      ctx.fillText('Tippen zum Neustart',GW/2,GH/2+12);
      ctx.textAlign='left';
      document.getElementById('gameHint').textContent=
        `Score: ${gScore}`+(gScore>=gHi?' — Neuer Rekord!':`  |  Rekord: ${gHi}`);
    }
    // ── MAP ──
    let leafletMap = null;
    let searchMarker = null;

    function openMap() {
      document.getElementById('mapOverlay').classList.add('active');
      if (!leafletMap) {
        leafletMap = L.map('mapContainer', { zoomControl: true }).setView([51.1657, 10.4515], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 19
        }).addTo(leafletMap);
      }
      setTimeout(() => leafletMap.invalidateSize(), 100);
    }

    function closeMap() {
      document.getElementById('mapOverlay').classList.remove('active');
    }

    async function searchPlace() {
      const q = document.getElementById('mapSearchInput').value.trim();
      if (!q) return;
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,
          { headers: { 'Accept-Language': 'de' } }
        );
        const data = await res.json();
        if (data.length === 0) { showNoResult(); return; }
        const { lat, lon, display_name } = data[0];
        leafletMap.setView([+lat, +lon], 15);
        if (searchMarker) searchMarker.remove();
        searchMarker = L.marker([+lat, +lon]).addTo(leafletMap)
          .bindPopup(display_name).openPopup();
      } catch { showNoResult(); }
    }

    function locateMe() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        leafletMap.setView([lat, lon], 15);
        if (searchMarker) searchMarker.remove();
        searchMarker = L.marker([lat, lon]).addTo(leafletMap)
          .bindPopup('Mein Standort').openPopup();
      }, () => showNoResult());
    }

    function showNoResult() {
      const el = document.getElementById('mapNoResult');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
